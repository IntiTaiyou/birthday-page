<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Love</title>

<style>
  body {
    margin: 0;
    text-align: center;
    background: linear-gradient(#800080, #32cd32);
    color: white;
    font-family: Arial, sans-serif;
  }

  h1 {
    margin-top: 20px;
  }

  .cake {
    position: relative;
    display: inline-block;
    margin-top: 40px;
  }

  .cake img {
    width: 300px;
    border-radius: 10px;
  }

  /* VELA */
  .candle {
    position: absolute;
    top: -30px;
    width: 10px;
    height: 50px;
    background: repeating-linear-gradient(
      45deg,
      pink,
      pink 5px,
      white 5px,
      white 10px
    );
    border-radius: 3px;
  }

  /* LLAMA */
  .flame {
    width: 12px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -18px;
    left: -1px;
    animation: flicker 0.2s infinite;
    box-shadow: 0 0 10px orange;
  }

  @keyframes flicker {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* HUMO */
  .smoke {
    position: absolute;
    top: -25px;
    left: -5px;
    width: 20px;
    height: 20px;
    background: rgba(200, 200, 200, 0.6);
    border-radius: 50%;
    opacity: 0;
    filter: blur(4px);
  }

  @keyframes smokeUp {
    0% {
      transform: translateY(0) scale(1);
      opacity: 0.6;
    }
    100% {
      transform: translateY(-40px) scale(2);
      opacity: 0;
    }
  }

  .smoke.active {
    animation: smokeUp 1.5s ease-out;
  }

  .hidden {
    display: none;
  }

  #message {
    display: none;
    margin-top: 20px;
    font-size: 20px;
    color: pink;
  }
</style>
</head>

<body>

<h1>Feliz cumple mi vidaaaa, haz un deseo</h1>
<p>Sopla las velas 🎂</p>

<div class="cake">
  <img src="pastel.jpg" alt="pastel">

  <!-- VELAS COMPLETAS -->
  <div class="candle" style="left: 80px;">
    <div class="flame"></div>
    <div class="smoke"></div>
  </div>

  <div class="candle" style="left: 140px;">
    <div class="flame"></div>
    <div class="smoke"></div>
  </div>

  <div class="candle" style="left: 200px;">
    <div class="flame"></div>
    <div class="smoke"></div>
  </div>
</div>

<p id="message">Te extraño mucho, te mando besitos mwahhh</p>

<script>
async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const mic = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();

    mic.connect(analyser);
    analyser.fftSize = 256;

    const dataArray = new Uint8Array(analyser.frequencyBinCount);

    function detectBlow() {
      analyser.getByteFrequencyData(dataArray);

      let volume = dataArray.reduce((a, b) => a + b) / dataArray.length;

      if (volume > 60) {
        // Apagar llamas
        document.querySelectorAll('.flame').forEach(f => {
          f.classList.add('hidden');
        });

        // Activar humo
        document.querySelectorAll('.smoke').forEach(s => {
          s.classList.add('active');
        });

        // Mostrar mensaje
        document.getElementById("message").style.display = "block";
      }

      requestAnimationFrame(detectBlow);
    }

    detectBlow();

  } catch (err) {
    alert("Necesitas permitir el micrófono 🎤");
  }
}

startMic();
</script>

</body>
</html>
